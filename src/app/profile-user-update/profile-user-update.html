<div class="page" id="page-profile-edit">
  <div class="container" style="max-width:560px;">
    <button class="btn-ghost" style="margin-bottom:16px;" onclick="showPage('profile')">← 뒤로</button>
    <div class="page-title">👤 Update Profile</div>
    <div class="form-card">
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div class="form-grid">
          <div class="form-group">
            <label class="label">First Name</label>
            <input type="text" class="input-field" [(ngModel)]="firstName">
          </div>
          <div class="form-group">
            <label class="label">Last Name</label>
            <input type="text" class="input-field" [(ngModel)]="lastName">
          </div>
          <div class="form-group full">
            <label class="label">Email</label>
            <input type="email" class="input-field" [(ngModel)]="email">
          </div>
          <div class="form-group">
            <label class="label">New password</label>
            <input type="password" class="input-field" placeholder="when you change the password" [(ngModel)]="password">
          </div>
          <div class="form-group">
            <label class="label">Confirm Password</label>
            <input type="password" class="input-field" placeholder="confirm the password" [(ngModel)]="passwordConfirm">
          </div>
          <div class="form-group full">
            <label class="label">Birth Date</label>
            <input type="date" class="input-field" [(ngModel)]="birthDate">
          </div>
        </div>
        <div style="display:flex;gap:12px;margin-top:8px;">
          <button class="btn-secondary" style="flex:1;" [routerLink]="['/home']">Cancel</button>
          <button class="btn-primary" style="flex:2;" (click)="doSave()">Save</button>
        </div>
      </div>
    </div>
  </div>
</div>
