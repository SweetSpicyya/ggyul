<div class="page active" id="page-login">
  <div class="page-sm">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="big-logo">🍊 GGYUL Market</div>
        <p>우리 동네 중고거래, 귤처럼 싱싱하게</p>
      </div>
      <div class="auth-form">
        <div class="form-group">
          <label class="label">E-mail</label>
          <input type="email" class="input-field" placeholder="example@email.com">
        </div>
        <div class="form-group">
          <label class="label">Password</label>
          <input type="password" class="input-field" placeholder="enter your password">
        </div>
        <p style="font-size:11px;color:var(--text3);text-align:right;margin-top:-6px;">60분 후 자동 로그아웃됩니다</p>
      </div>
      <div class="auth-actions" style="margin-top:20px;">
        <button class="btn-primary" style="width:100%;padding:14px;" onclick="doLogin()">Login</button>
        <div class="auth-divider">or</div>
        <button class="btn-secondary" style="width:100%;padding:14px;" onclick="showPage('register')">Sign up</button>
      </div>
    </div>
  </div>
</div>
